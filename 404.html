<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'DM Mono', 'Courier New', monospace;
  }
  .container {
    text-align: center;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .spinner {
    width: 48px; height: 48px;
    margin: 0 auto 28px;
    position: relative;
  }
  .spinner::before, .spinner::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2.5px solid transparent;
  }
  .spinner::before {
    border-top-color: #7c6aff;
    border-right-color: #7c6aff;
    animation: spin 0.9s cubic-bezier(0.4,0,0.2,1) infinite;
  }
  .spinner::after {
    border-bottom-color: rgba(124,106,255,0.2);
    border-left-color: rgba(124,106,255,0.2);
    animation: spin 0.9s cubic-bezier(0.4,0,0.2,1) infinite reverse;
    animation-delay: -0.45s;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .label { color: #7070a0; font-size: 13px; letter-spacing: 0.5px; }
  .dot-1, .dot-2, .dot-3 { display: inline-block; animation: blink 1.2s infinite; }
  .dot-2 { animation-delay: 0.2s; }
  .dot-3 { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
  .fallback { margin-top: 32px; display: none; }
  .fallback p { color: #f87171; font-size: 12px; margin-bottom: 16px; }
  .btn { display: inline-block; padding: 10px 24px; background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.4); color: #7c6aff; border-radius: 8px; font-size: 13px; text-decoration: none; transition: all 0.2s; }
  .btn:hover { background: rgba(124,106,255,0.2); }
</style>
</head>
<body>
<div class="container">
  <div class="spinner"></div>
  <div class="label">
    Redirecting<span class="dot-1">.</span><span class="dot-2">.</span><span class="dot-3">.</span>
  </div>
  <div class="fallback" id="fallback">
    <p>Ссылка не найдена</p>
    <a class="btn" id="home-link" href="/">← На главную</a>
  </div>
</div>
<script>
  var parts = window.location.pathname.split('/').filter(Boolean);
  var code = '';
  var homeUrl = '/';

  if (parts.length >= 2) {
    homeUrl = window.location.origin + '/' + parts[0] + '/';
    code = parts[parts.length - 1];
  } else if (parts.length === 1) {
    homeUrl = window.location.origin + '/';
    code = parts[0];
  }

  document.getElementById('home-link').href = homeUrl;

  if (code && code !== 'index.html' && code !== '404.html') {
    setTimeout(function() {
      window.location.replace(homeUrl + '?r=' + encodeURIComponent(code));
    }, 50);
    setTimeout(function() {
      document.getElementById('fallback').style.display = 'block';
    }, 5000);
  } else {
    window.location.replace(homeUrl);
  }
</script>
</body>
</html>
