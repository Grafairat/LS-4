<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'DM Mono', 'Courier New', monospace; }
  .wrap { text-align: center; animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .spinner { width: 48px; height: 48px; margin: 0 auto 28px; position: relative; }
  .spinner::before, .spinner::after { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 2.5px solid transparent; }
  .spinner::before { border-top-color: #7c6aff; border-right-color: #7c6aff; animation: spin 0.9s cubic-bezier(0.4,0,0.2,1) infinite; }
  .spinner::after { border-bottom-color: rgba(124,106,255,0.2); border-left-color: rgba(124,106,255,0.2); animation: spin 0.9s cubic-bezier(0.4,0,0.2,1) infinite reverse; animation-delay:-0.45s; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .label { color: #7070a0; font-size: 13px; letter-spacing: 0.5px; }
  .dot { display: inline-block; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .error { margin-top: 32px; display: none; }
  .error p { color: #f87171; font-size: 12px; margin-bottom: 16px; }
  .btn { display: inline-block; padding: 10px 24px; background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.4); color: #7c6aff; border-radius: 8px; font-size: 13px; text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <div class="label">Redirecting<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
  <div class="error" id="error">
    <p id="error-msg">Ссылка не найдена</p>
    <a class="btn" id="home-btn">На главную</a>
  </div>
</div>
<script>
  var JSONBIN_API_KEY = "$2a$10$gXwzHkBNw/uEHq8HQbBy4uNBsIDNxcayQXm3wBSgpe70HQkXxiCyy";
  var JSONBIN_BIN_ID  = "69bd78e5c3097a1dd54320a4";

  var parts = window.location.pathname.split('/').filter(Boolean);
  var code = '';
  var homeUrl = window.location.origin + '/';
  if (parts.length >= 2) { homeUrl = window.location.origin + '/' + parts[0] + '/'; code = parts[parts.length - 1]; }
  else if (parts.length === 1) { code = parts[0]; }

  document.getElementById('home-btn').href = homeUrl;

  function showError(msg) {
    if (msg) document.getElementById('error-msg').textContent = msg;
    document.getElementById('error').style.display = 'block';
  }

  if (!code || code === 'index.html' || code === '404.html') {
    window.location.replace(homeUrl);
  } else if (JSONBIN_API_KEY === "ВСТАВЬ_СЮДА_MASTER_KEY") {
    showError('Ключи JSONBin не вставлены в 404.html');
  } else {
    fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Meta': 'false' }
    })
    .then(function(r) { if (!r.ok) throw new Error('Ошибка ' + r.status); return r.json(); })
    .then(function(data) {
      var links = data.links || [];
      var entry = null;
      for (var i = 0; i < links.length; i++) { if (links[i].code === code) { entry = links[i]; break; } }
      if (!entry) { showError('Ссылка не найдена'); return; }

      entry.clicks = entry.clicks || [];
      entry.clicks.push({ ts: Date.now(), ref: document.referrer || 'direct',
        device: /mobile|android|iphone|ipod|blackberry|iemobile|opera mini/i.test(navigator.userAgent) ? 'mobile'
               : /tablet|ipad|playbook|silk/i.test(navigator.userAgent) ? 'tablet' : 'desktop' });
      entry.total_clicks = (entry.total_clicks || 0) + 1;
      fetch('https://api.jsonbin.io/v3/b/' + JSONBIN_BIN_ID, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
        body: JSON.stringify({ links: links })
      });

      window.location.replace(entry.url);
    })
    .catch(function(e) { showError('Ошибка: ' + e.message); });
  }
</script>
</body>
</html>
