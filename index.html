<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════
// ПРОВЕРКА КОНФИГУРАЦИИ
// ═══════════════════════════════════════
const IS_CONFIGURED = JSONBIN_API_KEY.length > 10 && JSONBIN_BIN_ID.length > 10;

const BASE_URL = (window.location.origin + window.location.pathname).replace(/\/+$/, '');
let ALL_LINKS = [];
let lastShortened = null;
let selectedCode = null;

// ═══════════════════════════════════════
// РЕНДЕР СТРУКТУРЫ СТРАНИЦЫ
// ═══════════════════════════════════════
function renderApp() {
  // Если это редирект — сразу показываем шторку, сайт не рендерим
  if (new URLSearchParams(window.location.search).get('r')) {
    document.getElementById('redirect-curtain').classList.add('on');
    return;
  }
  const app = document.getElementById('app');

  if (!IS_CONFIGURED) {
    app.innerHTML = `
      <nav>
        <div class="logo"><span>figma</span>.fun</div>
      </nav>
      <div class="not-configured">
        <div class="icon">🔧</div>
        <h2>Нужно добавить ключи</h2>
        <p>Открой файл <code style="background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;font-size:13px">index.html</code> в любом текстовом редакторе (Notepad, VS Code) и замени две строки вверху файла.</p>
        <div class="steps-box">
          <h3>Пошагово</h3>
          <div class="step-item">
            <div class="sn">1</div>
            <div class="st">Зайди на <a href="https://jsonbin.io" target="_blank">jsonbin.io</a> → Sign Up (бесплатно)</div>
          </div>
          <div class="step-item">
            <div class="sn">2</div>
            <div class="st">Профиль → <strong>API Keys</strong> → скопируй <code>Master Key</code></div>
          </div>
          <div class="step-item">
            <div class="sn">3</div>
            <div class="st">Главная → <strong>+ New Bin</strong> → вставь <code>{"links":[]}</code> → Create → скопируй <strong>Bin ID</strong> из URL</div>
          </div>
          <div class="step-item">
            <div class="sn">4</div>
            <div class="st">В файле <code>index.html</code> найди строки:<br><code>ВСТАВЬ_СЮДА_MASTER_KEY</code><br><code>ВСТАВЬ_СЮДА_BIN_ID</code><br>и замени их своими ключами</div>
          </div>
          <div class="step-item">
            <div class="sn">5</div>
            <div class="st">Загрузи обновлённый файл на GitHub и всё готово ✓</div>
          </div>
        </div>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <nav>
      <div class="logo"><span>figma</span>.fun</div>
      <div class="nav-links">
        <button class="active" id="nav-home" onclick="showPage('home')">Shorten</button>
        <button id="nav-analytics" onclick="showPage('analytics')">Analytics</button>
      </div>
    </nav>

    <div class="page active" id="page-home">
      <div class="hero">
        <div class="hero-badge">Link shortener</div>
        <h1>Turn long links into<br><span class="grad">pure fun</span></h1>
        <p>Вставь любую ссылку — получи короткую,<br>которая работает с любого устройства.</p>
        <div class="shorten-form">
          <input type="url" id="url-input" placeholder="https://www.figma.com/file/..." autocomplete="off" spellcheck="false">
          <button class="btn-shorten" id="btn-shorten" onclick="shortenURL()">
            <div class="spinner" id="shorten-spinner"></div>
            <span id="shorten-label">Shorten ↗</span>
          </button>
        </div>
        <div class="result-box" id="result-box">
          <div class="result-url">
            <div class="label">твоя короткая ссылка</div>
            <a class="short-link" id="result-short" href="#" target="_blank"></a>
            <div class="orig-link" id="result-orig"></div>
          </div>
          <div class="result-actions">
            <button class="btn-copy" id="btn-copy" onclick="copyShort()">Копировать</button>
            <button class="btn-qr" onclick="showQR()">QR</button>
          </div>
        </div>
        <div class="stats-strip">
          <div class="stat"><div class="stat-num" id="stat-total"><span>…</span></div><div class="stat-label">ссылок создано</div></div>
          <div class="stat"><div class="stat-num" id="stat-clicks"><span>…</span></div><div class="stat-label">всего кликов</div></div>
          <div class="stat"><div class="stat-num" id="stat-today"><span>…</span></div><div class="stat-label">сегодня</div></div>
        </div>
      </div>
      <div class="recent-section">
        <div class="section-title">
          Последние ссылки
          <button class="refresh-btn" onclick="loadAllLinks()" title="Обновить">↻</button>
        </div>
        <div class="links-list" id="links-list">
          <div class="empty-state"><span class="emoji">⏳</span>Загрузка...</div>
        </div>
      </div>
    </div>

    <div class="page" id="page-analytics">
      <div class="analytics-page">
        <div class="page-header">
          <h2>Analytics</h2>
          <p>Клики, устройства и источники трафика</p>
        </div>
        <div class="link-selector" id="link-selector"></div>
        <div id="analytics-content"><div class="no-data">Загрузка...</div></div>
      </div>
    </div>
  `;

  document.getElementById('url-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') shortenURL();
  });
}

// ═══════════════════════════════════════
// JSONBIN API
// ═══════════════════════════════════════
async function readBin() {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY, 'X-Bin-Meta': 'false' }
  });
  if (!r.ok) throw new Error('Ошибка чтения: ' + r.status);
  const data = await r.json();
  return Array.isArray(data.links) ? data.links : [];
}

async function writeBin(links) {
  const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
    body: JSON.stringify({ links })
  });
  if (!r.ok) throw new Error('Ошибка записи: ' + r.status);
}

// ═══════════════════════════════════════
// REDIRECT
// ═══════════════════════════════════════
async function checkRedirect() {
  const hash = new URLSearchParams(window.location.search).get('r') || '';
  if (!hash || !IS_CONFIGURED) return;

  try {
    const links = await readBin();
    const entry = links.find(l => l.code === hash);
    if (!entry) return;

    const click = {
      ts: Date.now(),
      ref: document.referrer || 'direct',
      device: getDevice()
    };
    entry.clicks = entry.clicks || [];
    entry.clicks.push(click);
    entry.total_clicks = (entry.total_clicks || 0) + 1;
    writeBin(links); // fire and forget
    window.location.replace(entry.url);
  } catch(e) {
    console.error('Redirect error:', e);
  }
}

function getDevice() {
  const ua = navigator.userAgent;
  if (/tablet|ipad|playbook|silk/i.test(ua)) return 'tablet';
  if (/mobile|android|iphone|ipod|blackberry|iemobile|opera mini/i.test(ua)) return 'mobile';
  return 'desktop';
}

// ═══════════════════════════════════════
// SHORTEN
// ═══════════════════════════════════════
function genCode(len = 8) {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  return Array.from({length: len}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

async function shortenURL() {
  const input = document.getElementById('url-input');
  const raw = input.value.trim();
  if (!raw) { showToast('Вставь URL!'); return; }

  let url = raw;
  if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
  try { new URL(url); } catch { showToast('Некорректный URL 🤔'); return; }

  setLoading(true);
  try {
    const links = await readBin();
    const existing = links.find(l => l.url === url);
    if (existing) {
      showResultBox(existing);
      ALL_LINKS = links;
      renderLinksList(); updateStats();
      showToast('Ссылка уже существует ✓');
      setLoading(false); return;
    }
    const code = genCode(8);
    const entry = { code, url, short: BASE_URL + '/' + code, created: Date.now(), total_clicks: 0, clicks: [] };
    links.unshift(entry);
    await writeBin(links);
    ALL_LINKS = links;
    showResultBox(entry);
    renderLinksList(); updateStats();
    showToast('Ссылка создана! ✨');
  } catch(e) { showToast('Ошибка: ' + e.message); }
  setLoading(false);
}

function setLoading(on) {
  const btn = document.getElementById('btn-shorten');
  document.getElementById('shorten-spinner').style.display = on ? 'block' : 'none';
  document.getElementById('shorten-label').textContent = on ? 'Создаю...' : 'Shorten ↗';
  btn.disabled = on;
}

function showResultBox(entry) {
  const box = document.getElementById('result-box');
  document.getElementById('result-short').textContent = entry.short;
  document.getElementById('result-short').href = entry.short;
  document.getElementById('result-orig').textContent = entry.url;
  box.classList.add('visible');
  lastShortened = entry;
}

function copyShort() {
  if (!lastShortened) return;
  navigator.clipboard.writeText(lastShortened.short).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Скопировано!';
    btn.classList.add('copied');
    showToast('Скопировано ✓');
    setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('copied'); }, 2000);
  });
}

// ═══════════════════════════════════════
// LINKS LIST
// ═══════════════════════════════════════
async function loadAllLinks() {
  try {
    ALL_LINKS = await readBin();
    renderLinksList(); updateStats();
  } catch(e) {
    document.getElementById('links-list').innerHTML = `<div class="empty-state"><span class="emoji">❌</span>Ошибка загрузки: ${e.message}</div>`;
  }
}

function renderLinksList() {
  const list = document.getElementById('links-list');
  if (!ALL_LINKS.length) {
    list.innerHTML = '<div class="empty-state"><span class="emoji">🔗</span>Нет ссылок. Сократи первую выше!</div>';
    return;
  }
  list.innerHTML = ALL_LINKS.slice(0, 12).map(l => {
    const icon = getFavicon(l.url);
    const date = new Date(l.created).toLocaleDateString('ru', { month:'short', day:'numeric' });
    return `
      <div class="link-item" onclick="viewAnalytics('${l.code}')">
        <div class="link-icon">${icon}</div>
        <div class="link-info">
          <div class="link-short">${l.name || ('#' + l.code)}</div>
          <div class="link-orig">${l.url}</div>
        </div>
        <div class="link-meta">
          <span class="link-clicks">${l.total_clicks || 0}</span>
          <span class="link-date">${date}</span>
        </div>
        <div class="link-actions" onclick="event.stopPropagation()">
          <button class="btn-sm" onclick="copyCode('${l.short}')">copy</button>
          <button class="btn-sm danger" onclick="deleteLink('${l.code}')">del</button>
        </div>
      </div>`;
  }).join('');
}

function getFavicon(url) {
  try {
    const h = new URL(url).hostname;
    if (h.includes('figma')) return '🎨';
    if (h.includes('github')) return '🐙';
    if (h.includes('youtube') || h.includes('youtu.be')) return '▶️';
    if (h.includes('notion')) return '📝';
    if (h.includes('twitter') || h.includes('x.com')) return '𝕏';
    if (h.includes('telegram') || h.includes('t.me')) return '✈️';
    if (h.includes('instagram')) return '📸';
    if (h.includes('google')) return '🔍';
    return '🔗';
  } catch { return '🔗'; }
}

function copyCode(short) {
  navigator.clipboard.writeText(short).then(() => showToast('Скопировано! ✓'));
}

async function deleteLink(code) {
  if (!confirm('Удалить ссылку?')) return;
  try {
    const links = ALL_LINKS.filter(l => l.code !== code);
    await writeBin(links);
    ALL_LINKS = links;
    renderLinksList(); updateStats();
    showToast('Удалено');
  } catch(e) { showToast('Ошибка: ' + e.message); }
}

function updateStats() {
  const today = new Date().toDateString();
  const todayCount = ALL_LINKS.filter(l => new Date(l.created).toDateString() === today).length;
  const totalClicks = ALL_LINKS.reduce((s, l) => s + (l.total_clicks || 0), 0);
  document.getElementById('stat-total').innerHTML = `<span>${ALL_LINKS.length}</span>`;
  document.getElementById('stat-clicks').innerHTML = `<span>${totalClicks}</span>`;
  document.getElementById('stat-today').innerHTML = `<span>${todayCount}</span>`;
}

// ═══════════════════════════════════════
// ANALYTICS
// ═══════════════════════════════════════
function viewAnalytics(code) { selectedCode = code; showPage('analytics'); }

function renderAnalytics() {
  const selector = document.getElementById('link-selector');
  const content = document.getElementById('analytics-content');
  if (!ALL_LINKS.length) {
    selector.innerHTML = '';
    content.innerHTML = '<div class="no-data">Нет ссылок</div>';
    return;
  }
  selector.innerHTML = ALL_LINKS.slice(0, 10).map(l =>
    `<div class="link-chip ${selectedCode === l.code ? 'active' : ''}" onclick="selectChip('${l.code}')">${l.name || l.code}</div>`
  ).join('');

  if (!selectedCode || !ALL_LINKS.find(l => l.code === selectedCode)) {
    selectedCode = ALL_LINKS[0].code;
  }

  const link = ALL_LINKS.find(l => l.code === selectedCode);
  if (!link) return;

  const clicks = link.clicks || [];
  const total = clicks.length;
  const deviceMap = { desktop: 0, mobile: 0, tablet: 0 };
  const refMap = {};
  const dayMap = {};

  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    dayMap[d.toLocaleDateString('ru', { month:'short', day:'numeric' })] = 0;
  }

  clicks.forEach(c => {
    deviceMap[c.device] = (deviceMap[c.device] || 0) + 1;
    const ref = (!c.ref || c.ref === 'direct') ? 'direct' : (() => {
      try { return new URL(c.ref).hostname.replace('www.', ''); } catch { return 'other'; }
    })();
    refMap[ref] = (refMap[ref] || 0) + 1;
    const day = new Date(c.ts).toLocaleDateString('ru', { month:'short', day:'numeric' });
    if (day in dayMap) dayMap[day]++;
  });

  const refEntries = Object.entries(refMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Hour of day (0-23)
  const hourMap = Array.from({length:24}, () => 0);
  // Day of week (0=Вс,1=Пн,...,6=Сб)
  const weekLabels = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  const weekMap = Array.from({length:7}, () => 0);
  clicks.forEach(c => {
    const d = new Date(c.ts);
    hourMap[d.getHours()]++;
    weekMap[d.getDay()]++;
  });
  const maxHour = Math.max(...hourMap, 1);
  const maxWeek = Math.max(...weekMap, 1);

  // Peak hour
  const peakHour = hourMap.indexOf(Math.max(...hourMap));
  const peakHourLabel = total > 0 ? `${peakHour}:00–${peakHour+1}:00` : null;
  const peakDay = weekMap.indexOf(Math.max(...weekMap));
  const peakDayLabel = total > 0 ? weekLabels[peakDay] : null;

  // Hour bars HTML
  const hourBars = hourMap.map((cnt, h) => {
    const pct = Math.max(Math.round(cnt / maxHour * 100), cnt > 0 ? 4 : 0);
    const isNight = h < 6;
    const isMorning = h >= 6 && h < 12;
    const isDay = h >= 12 && h < 18;
    const color = isNight ? 'rgba(124,106,255,0.2)' : isMorning ? 'rgba(106,255,204,0.35)' : isDay ? 'rgba(124,106,255,0.5)' : 'rgba(255,106,176,0.4)';
    return `<div class="hour-bar" style="height:${pct}%;background:${pct>0?color:'rgba(255,255,255,0.04)'}" data-tip="${h}:00 — ${cnt} кл."></div>`;
  }).join('');

  // Week bars HTML
  const weekBars = weekMap.map((cnt, i) => {
    const pct = Math.max(Math.round(cnt / maxWeek * 100), cnt > 0 ? 4 : 0);
    return `<div class="week-bar-wrap">
      <div class="week-bar-track"><div class="week-bar-fill" style="height:${pct}%"></div></div>
      <div class="week-bar-label">${weekLabels[i]}</div>
      <div class="week-bar-count">${cnt}</div>
    </div>`;
  }).join('');
  const maxRef = refEntries.length ? refEntries[0][1] : 1;
  const devTotal = Object.values(deviceMap).reduce((a,b)=>a+b,0) || 1;
  const donutData = [
    { label: 'Desktop', val: deviceMap.desktop, color: '#7c6aff' },
    { label: 'Mobile',  val: deviceMap.mobile,  color: '#ff6ab0' },
    { label: 'Tablet',  val: deviceMap.tablet,  color: '#6affcc' },
  ].filter(d => d.val > 0);

  const dayVals = Object.values(dayMap);
  const maxDay = Math.max(...dayVals, 1);
  const sparkBars = Object.entries(dayMap).map(([day, cnt]) =>
    `<div class="spark-bar" style="height:${Math.max(Math.round(cnt/maxDay*100),4)}%" title="${day}: ${cnt}"></div>`
  ).join('');

  const nameDisplay = link.name
    ? `<span>${link.name}</span>`
    : `<span class="placeholder">Добавить название...</span>`;

  content.innerHTML = `
    <div class="rename-row" id="rename-row">
      <div class="link-name-display" id="name-display" onclick="startRename('${link.code}')" title="Нажми чтобы переименовать">${nameDisplay}</div>
      <div id="rename-form" style="display:none;flex:1;display:none;align-items:center;gap:8px">
        <input class="rename-input" id="rename-input" type="text" placeholder="Название ссылки..." value="${(link.name || '').replace(/"/g,'&quot;')}">
        <button class="btn-rename-save" onclick="saveRename('${link.code}')">Сохранить</button>
        <button class="btn-rename-cancel" onclick="cancelRename()">✕</button>
      </div>
    </div>
    <div class="analytics-grid">
      <div class="metric-card">
        <div class="metric-label">Всего кликов</div>
        <div class="metric-value" style="color:var(--accent)">${total}</div>
        <div class="metric-sub">#${link.code}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Назначение</div>
        <div style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);word-break:break-all;margin-top:8px;line-height:1.5">${link.url}</div>
        <div class="metric-sub" style="margin-top:8px">Создано ${new Date(link.created).toLocaleDateString('ru', {day:'numeric',month:'long',year:'numeric'})}</div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title"><div class="dot" style="background:var(--accent)"></div>Клики за 7 дней</div>
      <div class="sparkline-wrap">
        ${total === 0
          ? '<div style="color:var(--muted);font-family:DM Mono,monospace;font-size:12px;align-self:center">Кликов пока нет</div>'
          : sparkBars}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        ${Object.keys(dayMap).map(d=>`<span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted)">${d}</span>`).join('')}
      </div>
    </div>

    <div class="analytics-grid">
      <div class="chart-card" style="margin:0">
        <div class="chart-title"><div class="dot" style="background:var(--accent)"></div>По часам суток</div>
        ${total === 0 ? '<div style="color:var(--muted);font-family:DM Mono,monospace;font-size:12px">Нет данных</div>' : `
        <div class="hour-chart">${hourBars}</div>
        <div class="hour-labels">
          <span class="hour-label">00</span><span class="hour-label">06</span>
          <span class="hour-label">12</span><span class="hour-label">18</span>
          <span class="hour-label">23</span>
        </div>
        ${peakHourLabel ? `<div class="peak-badge">⏰ Пик: ${peakHourLabel}</div>` : ''}
        `}
      </div>
      <div class="chart-card" style="margin:0">
        <div class="chart-title"><div class="dot" style="background:var(--accent2)"></div>По дням недели</div>
        ${total === 0 ? '<div style="color:var(--muted);font-family:DM Mono,monospace;font-size:12px">Нет данных</div>' : `
        <div class="week-chart">${weekBars}</div>
        ${peakDayLabel ? `<div class="peak-badge">📅 Пик: ${peakDayLabel}</div>` : ''}
        `}
      </div>
    </div>

    <div class="analytics-grid">
      <div class="chart-card" style="margin:0">
        <div class="chart-title"><div class="dot" style="background:var(--accent2)"></div>Устройства</div>
        ${total === 0 ? '<div style="color:var(--muted);font-family:DM Mono,monospace;font-size:12px">Нет данных</div>' : `
        <div class="donut-wrap">
          ${buildDonut(donutData, devTotal, total)}
          <div class="donut-legend">
            ${donutData.map(d=>`
              <div class="legend-item">
                <div class="legend-dot" style="background:${d.color}"></div>
                <span>${d.label}</span>
                <span class="legend-pct">${Math.round(d.val/devTotal*100)}%</span>
              </div>`).join('')}
          </div>
        </div>`}
      </div>

      <div class="chart-card" style="margin:0">
        <div class="chart-title"><div class="dot" style="background:var(--accent3)"></div>Источники</div>
        ${total === 0 ? '<div style="color:var(--muted);font-family:DM Mono,monospace;font-size:12px">Нет данных</div>' : `
        <div class="bar-chart">
          ${refEntries.map(([ref,cnt])=>`
            <div class="bar-row">
              <div class="bar-label">${ref}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${Math.round(cnt/maxRef*100)}%;background:var(--accent3)"></div></div>
              <div class="bar-count">${cnt}</div>
            </div>`).join('')}
        </div>`}
      </div>
    </div>
  `;
}


// ═══════════════════════════════════════
// RENAME
// ═══════════════════════════════════════
function startRename(code) {
  const row = document.getElementById('rename-row');
  document.getElementById('name-display').style.display = 'none';
  const form = document.getElementById('rename-form');
  form.style.display = 'flex';
  const input = document.getElementById('rename-input');
  input.focus();
  input.select();
  input.onkeydown = (e) => {
    if (e.key === 'Enter') saveRename(code);
    if (e.key === 'Escape') cancelRename();
  };
}

function cancelRename() {
  document.getElementById('name-display').style.display = '';
  document.getElementById('rename-form').style.display = 'none';
}

async function saveRename(code) {
  const input = document.getElementById('rename-input');
  const name = input.value.trim();
  try {
    const links = ALL_LINKS;
    const entry = links.find(l => l.code === code);
    if (!entry) return;
    entry.name = name;
    await writeBin(links);
    ALL_LINKS = links;
    showToast(name ? `Название сохранено: ${name}` : 'Название удалено');
    renderAnalytics();
    renderLinksList();
  } catch(e) { showToast('Ошибка: ' + e.message); }
}

function buildDonut(data, total, clicks) {
  if (!data.length) return `<svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="36" fill="none" stroke="#2a2a3a" stroke-width="16"/></svg>`;
  const r = 36, cx = 50, cy = 50, circ = 2 * Math.PI * r;
  let offset = 0;
  const paths = data.map(d => {
    const len = (d.val / total) * circ;
    const arc = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.color}" stroke-width="16" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})" opacity="0.9"/>`;
    offset += len; return arc;
  }).join('');
  return `<svg width="100" height="100" viewBox="0 0 100 100">${paths}
    <text x="50" y="46" text-anchor="middle" fill="#f0eeff" font-size="16" font-weight="800" font-family="Syne,sans-serif">${clicks}</text>
    <text x="50" y="60" text-anchor="middle" fill="#7070a0" font-size="9" font-family="DM Mono,monospace">clicks</text>
  </svg>`;
}

function selectChip(code) { selectedCode = code; renderAnalytics(); }

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'analytics') renderAnalytics();
}

// ═══════════════════════════════════════
// QR
// ═══════════════════════════════════════
function showQR() {
  if (!lastShortened) return;
  document.getElementById('qr-label').textContent = lastShortened.short;
  const canvas = document.getElementById('qr-canvas');
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1a1a24'; ctx.fillRect(0, 0, 200, 200);
  const img = new Image(); img.crossOrigin = 'anonymous';
  img.onload = () => { ctx.fillStyle = '#1a1a24'; ctx.fillRect(0,0,200,200); ctx.drawImage(img,10,10,180,180); };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(lastShortened.short)}&color=f0eeff&bgcolor=1a1a24`;
  document.getElementById('qr-modal').classList.add('open');
}
function closeQR(e) {
  if (!e || e.target === document.getElementById('qr-modal') || !e.target)
    document.getElementById('qr-modal').classList.remove('open');
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
// Если редирект — показываем шторку и редиректим, ничего больше не грузим
if (new URLSearchParams(window.location.search).get('r')) {
  document.getElementById('redirect-curtain').classList.add('on');
  if (IS_CONFIGURED) checkRedirect();
} else {
  renderApp();
  if (IS_CONFIGURED) loadAllLinks();
}
</script>
